<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>
      {% block title %}
        Child Occupancy, Management, Enrollment & Tracking
      {% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" />

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <style>
      html {
        scroll-behavior: smooth;
      }
    </style>
  </head>

  <body>
    <form style="display:none">
      {% csrf_token %}
    </form>
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand" href="/planning/">ACCC Dashboard</a>

        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="/admin/">Admin</a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="container mt-4">
      <div id="messages-container">
        {% if messages %}
          <div class="mt-3">
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}

                <button class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          </div>
        {% endif %}
      </div>
      
      {% block content %}

      {% endblock content %}
    </div>

    <button id="backToTop" class="btn btn-primary rounded-circle shadow" style="
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      display: none;
      z-index: 1000;
      " title="Back to top"><i class="bi bi-arrow-up"></i></button>
    <script>
      const backToTop = document.getElementById('backToTop')
      
      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
          backToTop.style.display = 'block'
        } else {
          backToTop.style.display = 'none'
        }
      })
      
      backToTop.addEventListener('click', () => {
        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        })
      })
    </script>
    <script>
      document.body.addEventListener('htmx:configRequest', (event) => {
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value
      
        event.detail.headers['X-CSRFToken'] = csrfToken
      })
    </script>
  </body>
</html>
